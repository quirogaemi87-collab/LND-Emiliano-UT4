<!DOCTYPE html>

<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <style>
            body{
                height: 650px;
                width: 100%;
            }

            header {
                height: 550px;
                background-image: url(images/imagen-generada-con-IA-nanobanana.avif);
            }

            #Contacto{
                height: 75px;   
            }

            #Iniciar-sesion{
                height: 75px;
            }

            #Buscar{
                height: 75px;
            }

            #marca_logo h1 {
                font-size: 100px;
            }

            #logo_buscar{
                width: 20px;
            }

            #caja_buscador{
                width: 200px;
            }

            #primer_imagen{
                margin-left: 25%;
            }

            #segunda_imagen{
                margin-left: 25%;
            }

            #tercer_imagen{
                margin-left: 25%;
            }

            #icono_iniciar{
                width: 25px;
            }

            #contacto{
                width: 25px;
            }

            #correo_logo{
                width: 25px;
            }

            #github_logo{
                width: 25px;
            }

            #instagram_logo{
                width: 25px;
            }

            #Contacto a,
            #Iniciar-sesion a {
                color: white;
                transition: 0.3s ease;
            }

            #contacto a:hover,
            #Iniciar-sesion a:hover {
                color: var(--bs-emphasis) 
            }

        </style>
    </head>

    <body style="font-family: Montserrat;">

        <header class="d-flex justify-content-between bg-dark align-items-center w-100">

            <!-- El botón para ver las categorías -->

            <div class="dropdown h-100">
                <a class="btn btn-dark dropdown-toggle position-absolute" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    Ver Categorías
                </a>

                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Hombres</a></li>
                    <li><a class="dropdown-item" href="#">Mujeres</a></li>
                    <li><a class="dropdown-item" href="#">Accesorios</a></li>
                </ul>
            </div>

            <!-- El logo y el nombre de la marca -->

            <div id="marca_logo" class="d-flex flex-column">
                <a href="Proyecto web.html">
                    <img src="images/logo_marca.png" class="w-50 h-100"></img>
                </a>
            </div>

            <!-- El nav para iniciar sesion, contactar y hacer una busqueda -->

            <nav class="d-flex w-50 h-100">

                <div id="Contacto" class="border-bottom rounded-2 p-4 bg-dark opacity-75">
                    <a class="d-flex text-decoration-none text-white" href="Contactanos">
                        <svg class="icono" id="contacto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" fill="currentColor"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M463 448.2C440.9 409.8 399.4 384 352 384L288 384C240.6 384 199.1 409.8 177 448.2C212.2 487.4 263.2 512 320 512C376.8 512 427.8 487.3 463 448.2zM64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576C178.6 576 64 461.4 64 320zM320 336C359.8 336 392 303.8 392 264C392 224.2 359.8 192 320 192C280.2 192 248 224.2 248 264C248 303.8 280.2 336 320 336z"/></svg>
                        Contactanos
                    </a>
                </div>

                <div id="Iniciar-sesion" class="border-bottom rounded-2 p-4 bg-dark opacity-75 ms-4">
                    <a class="d-flex text-decoration-none text-white" href="Iniciar-sesion">
                        <svg class="icono" id="icono_iniciar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" fill="currentColor"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 312C386.3 312 440 258.3 440 192C440 125.7 386.3 72 320 72C253.7 72 200 125.7 200 192C200 258.3 253.7 312 320 312zM290.3 368C191.8 368 112 447.8 112 546.3C112 562.7 125.3 576 141.7 576L498.3 576C514.7 576 528 562.7 528 546.3C528 447.8 448.2 368 349.7 368L290.3 368z"/></svg>
                        Iniciar Sesión
                    </a>
                </div>
                  
                <div id="Buscar" class="border-bottom p-4 container-fluid w-25 justify-content-end" role="search">
                    <form class="d-flex" role="search">

                        <input id="caja_buscador" class="form-control me-2" type="search" placeholder="Buscar..." aria-label="Search"/>

                        <button id="buscador" class="d-flex btn btn-outline-dark" type="submit">
                            <img id="logo_buscar" src="images/buscar.png"></img>
                            BUSCAR
                        </button>

                    </form>
                </div>

            </nav>

        </header>

        <!-- Centro de la página, el carrusel -->

        <div id="centro" class="d-flex flex-column h-100 justify-content-center align-items-center">

            <h2>vetta</h2>
            <h1>Tendencias</h1>
            <h5>Back to Basics</h5>

           <div id="carouselExampleAutoplaying" class="carousel slide w-75" data-bs-ride="carousel">
                <div class="carousel-inner">

                    <div class="carousel-item active">
                        <img id="primer_imagen" src="images/primer_foto-removebg-preview.png" class="d-block w-50" alt="...">
                        85€
                    </div>

                    <div class="carousel-item">
                        <img id="segunda_imagen" src="images/segunda_foto-removebg-preview.png" class="d-block w-50" alt="...">
                        75€
                    </div>

                    <div class="carousel-item">
                        <img id="tercer_imagen" src="images/tercer_foto-removebg-preview.png" class="d-block w-50" alt="...">
                        46€
                    </div>

                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon bg-dark" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
                    <span class="carousel-control-next-icon bg-dark" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>

        <!-- Boton de descubrir más -->

        <div class="d-flex w-100 justify-content-center pb-5">
            <button class="bg-dark">
                <a href="#" class="text-decoration-none text-white">
                Descrubir más
                </a>
            </button>
        </div>
